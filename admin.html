<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Produk - Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>

  <body class="bg-[#f4f7f6]">
    <div class="flex flex-col md:flex-row min-h-screen">
      <!-- SIDEBAR -->
      <aside
        id="sidebar"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-amber-500 text-white p-6 shadow-lg transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0"
      >
        <div class="flex justify-between items-center mb-8">
          <h1 class="text-2xl font-bold">🍰 Admin Bakery</h1>
          <button
            onclick="toggleSidebar()"
            class="md:hidden text-white text-2xl"
          >
            ✕
          </button>
        </div>
        <nav class="space-y-4">
          <a href="#" class="block bg-amber-600 p-3 rounded-lg font-medium"
            >Manajemen Produk</a
          >
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 p-4 md:p-8 overflow-y-auto">
        <!-- HEADER -->
        <div
          class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8"
        >
          <div class="flex items-center gap-3">
            <button
              onclick="toggleSidebar()"
              class="md:hidden bg-amber-500 text-white p-2 rounded"
            >
              ☰
            </button>
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800">
              Daftar Produk
            </h2>
          </div>
          <div class="flex items-center gap-3">
            <a
              href="../"
              class="bg-amber-500 text-white px-5 py-2 rounded-full shadow-sm hover:bg-amber-600 transition"
              >← Home</a
            >
            <button
              onclick="openModal()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-full shadow transition"
            >
              ➕ <span class="hidden sm:inline">Tambah Produk</span
              ><span class="sm:hidden">Produk</span>
            </button>
          </div>
        </div>

        <!-- TABLE -->
        <div class="bg-white rounded-xl shadow-md overflow-x-auto">
          <table class="w-full text-left border-collapse min-w-[600px]">
            <thead class="bg-gray-100/80 border-b-2 border-gray-200">
              <tr>
                <th class="p-4 font-bold text-gray-700 text-xs uppercase">
                  Foto
                </th>
                <th class="p-4 font-bold text-gray-700 text-xs uppercase">
                  Nama Produk
                </th>
                <th class="p-4 font-bold text-gray-700 text-xs uppercase">
                  Stok
                </th>
                <th class="p-4 font-bold text-gray-700 text-xs uppercase">
                  Harga
                </th>
                <th class="p-4 font-bold text-gray-700 text-xs uppercase">
                  Keterangan
                </th>
                <th
                  class="p-4 font-bold text-gray-700 text-xs uppercase text-center"
                >
                  Aksi
                </th>
              </tr>
            </thead>
            <tbody id="product-list" class="divide-y text-sm">
              <!-- Data dari Supabase akan muncul di sini via script.js -->
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- MODAL -->
    <div
      id="modal"
      class="fixed inset-0 bg-black/60 hidden flex items-center justify-center backdrop-blur-sm z-[60]"
    >
      <div class="bg-white p-8 rounded-2xl w-96 shadow-2xl">
        <h2 id="modal-title" class="text-xl font-bold mb-6 text-gray-800">
          Tambah Produk
        </h2>
        <div class="space-y-4">
          <input
            id="name"
            type="text"
            placeholder="Nama Produk"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-amber-500 outline-none"
          />
          <input
            id="stock"
            type="number"
            placeholder="Jumlah Stok"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-amber-500 outline-none"
          />
          <input
            id="price"
            type="number"
            placeholder="Harga (Rp)"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-amber-500 outline-none"
          />
          <textarea
            id="description"
            placeholder="Keterangan singkat"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-amber-500 outline-none h-24"
          ></textarea>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-2"
              >Foto Produk:</label
            >
            <div class="flex items-center gap-4">
              <img
                id="preview-old"
                src=""
                class="w-16 h-16 object-cover rounded-lg border hidden shadow-sm"
              />
              <input
                id="image"
                type="file"
                accept="image/*"
                class="w-full text-xs text-gray-500 cursor-pointer"
              />
            </div>
          </div>
        </div>
        <div class="flex gap-3 mt-8">
          <button
            onclick="saveProduct()"
            class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-lg font-bold transition"
          >
            Simpan
          </button>
          <button
            onclick="closeModal()"
            class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-lg font-bold transition"
          >
            Batal
          </button>
        </div>
      </div>
    </div>

    <div
      id="overlay"
      onclick="toggleSidebar()"
      class="fixed inset-0 bg-black opacity-50 hidden z-40"
    ></div>
    <script src="js/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>

    <!-- 3. Sidebar Toggle (Sederhana ditaruh sini saja) -->
    <script>
      function toggleSidebar() {
        document
          .getElementById("sidebar")
          .classList.toggle("-translate-x-full");
        document.getElementById("overlay").classList.toggle("hidden");
      }
    </script>
  </body>
</html>
